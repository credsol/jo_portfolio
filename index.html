<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Jerry Osagie — Steward. Builder. Minister in the Marketplace.</title>
		<meta
			name="description"
			content="Jerry Osagie — Called to equip leaders, families and nations to steward God's trust well. Finance Executive. Author. Speaker. Minister in the Marketplace."
		/>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600;1,700&family=Outfit:wght@200;300;400;500;600;700&display=swap"
			rel="stylesheet"
		/>
		<style>
			:root {
				--navy: #08172e;
				--navy2: #0f2340;
				--navy3: #162f52;
				--gold: #c4893a;
				--gold2: #dba862;
				--gold3: #f0d4a0;
				--green: #1a3d2b;
				--green2: #2a5c3f;
				--green3: #4a8c60;
				--cream: #f8f4ee;
				--white: #ffffff;
				--ink: #111827;
				--mid: #4b5563;
				--soft: #9ca3af;
				--serif: 'Cormorant Garamond', Georgia, serif;
				--sans: 'Outfit', system-ui, sans-serif;
				--ease: cubic-bezier(0.22, 1, 0.36, 1);
			}
			*,
			*::before,
			*::after {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}
			html {
				scroll-behavior: smooth;
			}
			body {
				font-family: var(--sans);
				background: var(--cream);
				color: var(--ink);
				overflow-x: hidden;
				cursor: none;
			}
			#cur {
				position: fixed;
				width: 8px;
				height: 8px;
				background: var(--gold);
				border-radius: 50%;
				pointer-events: none;
				z-index: 9999;
				transform: translate(-50%, -50%);
				transition:
					width 0.25s,
					height 0.25s;
			}
			#cur-r {
				position: fixed;
				width: 32px;
				height: 32px;
				border: 1.5px solid var(--gold);
				border-radius: 50%;
				pointer-events: none;
				z-index: 9998;
				transform: translate(-50%, -50%);
				transition: all 0.15s var(--ease);
				opacity: 0.55;
			}

			/* NAV */
			nav {
				position: fixed;
				top: 0;
				left: 0;
				right: 0;
				z-index: 300;
				display: flex;
				align-items: center;
				justify-content: space-between;
				padding: 0 5vw;
				height: 70px;
				transition:
					background 0.5s,
					border-color 0.5s;
			}
			nav.on {
				background: rgba(8, 23, 46, 0.97);
				backdrop-filter: blur(16px);
				border-bottom: 1px solid rgba(196, 137, 58, 0.15);
			}
			.nav-logo {
				font-family: var(--serif);
				font-size: 1.25rem;
				font-weight: 600;
				color: #fff;
				text-decoration: none;
			}
			.nav-logo b {
				color: var(--gold2);
			}
			.nav-links {
				display: flex;
				gap: 2rem;
				list-style: none;
			}
			.nav-links a {
				font-size: 0.7rem;
				font-weight: 500;
				letter-spacing: 0.14em;
				text-transform: uppercase;
				color: rgba(255, 255, 255, 0.6);
				text-decoration: none;
				transition: color 0.2s;
			}
			.nav-links a:hover {
				color: var(--gold2);
			}
			.nav-btn {
				font-size: 0.7rem;
				font-weight: 700;
				letter-spacing: 0.12em;
				text-transform: uppercase;
				color: var(--navy);
				background: var(--gold);
				padding: 0.5rem 1.4rem;
				border-radius: 1px;
				text-decoration: none;
				transition: background 0.2s;
			}
			.nav-btn:hover {
				background: var(--gold2);
			}

			/* ══ HERO — full screen calling statement ══ */
			#hero {
				position: relative;
				height: 100vh;
				min-height: 700px;
				display: flex;
				align-items: center;
				overflow: hidden;
				background: var(--navy);
			}
			.hero-forest {
				position: absolute;
				inset: 0;
				z-index: 0;
			}
			/* Cedar silhouette SVG fills background */
			.cedar-bg {
				position: absolute;
				bottom: 0;
				right: 0;
				height: 115%;
				opacity: 0.07;
				pointer-events: none;
			}
			.hero-grad {
				position: absolute;
				inset: 0;
				background: linear-gradient(
					105deg,
					rgba(8, 23, 46, 1) 35%,
					rgba(8, 23, 46, 0.6) 65%,
					rgba(8, 23, 46, 0.2) 100%
				);
				z-index: 1;
			}
			.hero-grad-b {
				position: absolute;
				bottom: 0;
				left: 0;
				right: 0;
				height: 30%;
				background: linear-gradient(to top, var(--navy), transparent);
				z-index: 1;
			}
			.glow {
				position: absolute;
				border-radius: 50%;
				pointer-events: none;
			}
			.glow1 {
				width: 500px;
				height: 500px;
				right: 5vw;
				top: 10%;
				background: radial-gradient(circle at 40%, rgba(26, 61, 43, 0.5), transparent 70%);
				animation: breathe 8s ease-in-out infinite;
			}
			.glow2 {
				width: 300px;
				height: 300px;
				right: 25vw;
				bottom: 15%;
				background: radial-gradient(circle, rgba(196, 137, 58, 0.07), transparent 70%);
				animation: breathe 12s ease-in-out infinite reverse;
			}
			@keyframes breathe {
				0%,
				100% {
					transform: scale(1);
				}
				50% {
					transform: scale(1.12);
				}
			}

			.hero-inner {
				position: relative;
				z-index: 2;
				padding: 0 5vw;
				max-width: 1280px;
				width: 100%;
				margin: 0 auto;
				padding-top: 70px;
			}
			.hero-calling {
				font-size: 0.7rem;
				font-weight: 700;
				letter-spacing: 0.24em;
				text-transform: uppercase;
				color: var(--gold2);
				display: flex;
				align-items: center;
				gap: 0.9rem;
				margin-bottom: 2rem;
				animation: fadeUp 0.9s var(--ease) 0.1s both;
			}
			.hero-calling-line {
				width: 40px;
				height: 1px;
				background: var(--gold);
			}
			.hero-verse {
				font-family: var(--serif);
				font-size: 0.95rem;
				font-style: italic;
				color: rgba(255, 255, 255, 0.4);
				margin-bottom: 1.8rem;
				animation: fadeUp 0.9s var(--ease) 0.15s both;
			}
			.hero-name {
				font-family: var(--serif);
				font-size: clamp(3.8rem, 8.5vw, 8rem);
				font-weight: 300;
				line-height: 0.92;
				color: #fff;
				margin-bottom: 1.5rem;
				animation: fadeUp 0.9s var(--ease) 0.2s both;
			}
			.hero-name strong {
				display: block;
				font-weight: 700;
			}
			.hero-name em {
				display: block;
				font-style: italic;
				color: var(--gold2);
				font-weight: 300;
			}
			.hero-rule {
				width: 60px;
				height: 1.5px;
				background: linear-gradient(90deg, var(--gold), transparent);
				margin-bottom: 2rem;
				animation: fadeUp 0.9s var(--ease) 0.28s both;
			}
			.hero-purpose {
				font-family: var(--serif);
				font-size: clamp(1.15rem, 2vw, 1.55rem);
				font-weight: 300;
				font-style: italic;
				color: rgba(255, 255, 255, 0.85);
				line-height: 1.6;
				max-width: 640px;
				margin-bottom: 1.5rem;
				animation: fadeUp 0.9s var(--ease) 0.35s both;
			}
			.hero-identity {
				font-size: 0.82rem;
				font-weight: 300;
				color: rgba(255, 255, 255, 0.5);
				line-height: 1.7;
				max-width: 520px;
				margin-bottom: 3rem;
				animation: fadeUp 0.9s var(--ease) 0.42s both;
			}
			.hero-identity strong {
				color: rgba(255, 255, 255, 0.8);
				font-weight: 500;
			}
			.hero-ctas {
				display: flex;
				gap: 1.1rem;
				flex-wrap: wrap;
				animation: fadeUp 0.9s var(--ease) 0.5s both;
			}
			.btn-p {
				display: inline-flex;
				align-items: center;
				gap: 0.6rem;
				background: var(--gold);
				color: var(--navy);
				font-size: 0.76rem;
				font-weight: 700;
				letter-spacing: 0.12em;
				text-transform: uppercase;
				text-decoration: none;
				padding: 0.85rem 1.8rem;
				border-radius: 1px;
				transition:
					background 0.2s,
					transform 0.2s var(--ease);
			}
			.btn-p:hover {
				background: var(--gold2);
				transform: translateY(-2px);
			}
			.btn-g {
				display: inline-flex;
				align-items: center;
				gap: 0.6rem;
				background: transparent;
				color: rgba(255, 255, 255, 0.75);
				font-size: 0.76rem;
				font-weight: 500;
				letter-spacing: 0.12em;
				text-transform: uppercase;
				text-decoration: none;
				padding: 0.85rem 1.8rem;
				border-radius: 1px;
				border: 1px solid rgba(255, 255, 255, 0.2);
				transition:
					border-color 0.2s,
					color 0.2s,
					transform 0.2s var(--ease);
			}
			.btn-g:hover {
				border-color: var(--gold);
				color: var(--gold2);
				transform: translateY(-2px);
			}

			/* Floating chips */
			.hero-chips {
				position: absolute;
				right: 5vw;
				top: 50%;
				transform: translateY(-50%);
				z-index: 3;
				display: flex;
				flex-direction: column;
				gap: 1rem;
				animation: fadeUp 0.9s var(--ease) 0.55s both;
			}
			.chip {
				background: rgba(255, 255, 255, 0.05);
				backdrop-filter: blur(12px);
				border: 1px solid rgba(196, 137, 58, 0.2);
				border-radius: 4px;
				padding: 1.1rem 1.4rem;
				min-width: 165px;
			}
			.chip-num {
				font-family: var(--serif);
				font-size: 2rem;
				font-weight: 600;
				color: var(--gold2);
				line-height: 1;
				display: block;
			}
			.chip-label {
				font-size: 0.66rem;
				font-weight: 400;
				color: rgba(255, 255, 255, 0.45);
				margin-top: 0.3rem;
				display: block;
			}
			.scroll-cue {
				position: absolute;
				bottom: 2.5rem;
				left: 5vw;
				z-index: 3;
				display: flex;
				align-items: center;
				gap: 0.8rem;
				animation: fadeUp 1s var(--ease) 0.9s both;
			}
			.scroll-line {
				width: 1px;
				height: 44px;
				background: linear-gradient(to bottom, var(--gold), transparent);
				animation: pulse 2.5s ease-in-out infinite;
			}
			.scroll-cue span {
				font-size: 0.62rem;
				letter-spacing: 0.22em;
				text-transform: uppercase;
				color: rgba(255, 255, 255, 0.28);
			}
			@keyframes pulse {
				0%,
				100% {
					opacity: 0.3;
				}
				50% {
					opacity: 1;
				}
			}

			/* ══ MARQUEE ══ */
			.marquee-wrap {
				background: var(--gold);
				overflow: hidden;
				padding: 0.7rem 0;
			}
			.marquee-track {
				display: flex;
				width: max-content;
				animation: marquee 32s linear infinite;
			}
			.mi {
				white-space: nowrap;
				padding: 0 2rem;
				font-size: 0.7rem;
				font-weight: 700;
				letter-spacing: 0.16em;
				text-transform: uppercase;
				color: var(--navy);
				display: flex;
				align-items: center;
				gap: 2rem;
			}
			.md {
				width: 4px;
				height: 4px;
				background: var(--navy);
				border-radius: 50%;
				opacity: 0.4;
			}
			@keyframes marquee {
				to {
					transform: translateX(-50%);
				}
			}
			@keyframes fadeUp {
				from {
					opacity: 0;
					transform: translateY(28px);
				}
				to {
					opacity: 1;
					transform: translateY(0);
				}
			}

			/* ══ CALLING / MISSION ══ */
			#calling {
				background: var(--white);
				overflow: hidden;
			}
			.calling-grid {
				display: grid;
				grid-template-columns: 1fr 1fr;
				min-height: 85vh;
			}
			.calling-visual {
				position: relative;
				overflow: hidden;
				background: var(--green);
			}
			.cedar-art {
				position: absolute;
				inset: 0;
				display: flex;
				align-items: center;
				justify-content: center;
			}
			.calling-overlay {
				position: absolute;
				bottom: 0;
				left: 0;
				right: 0;
				padding: 2.5rem;
				background: linear-gradient(to top, rgba(10, 30, 18, 0.95) 60%, transparent);
			}
			.calling-overlay blockquote {
				font-family: var(--serif);
				font-size: 1.1rem;
				font-style: italic;
				color: rgba(255, 255, 255, 0.92);
				line-height: 1.6;
				border-left: 3px solid var(--gold);
				padding-left: 1.2rem;
				margin-bottom: 0.6rem;
			}
			.calling-overlay cite {
				font-size: 0.7rem;
				letter-spacing: 0.14em;
				text-transform: uppercase;
				color: var(--gold2);
			}
			.calling-text {
				padding: 7vw 5vw;
				display: flex;
				flex-direction: column;
				justify-content: center;
			}
			.section-eyebrow {
				font-size: 0.68rem;
				font-weight: 700;
				letter-spacing: 0.2em;
				text-transform: uppercase;
				color: var(--gold);
				display: flex;
				align-items: center;
				gap: 0.8rem;
				margin-bottom: 1.2rem;
			}
			.section-eyebrow::before {
				content: '';
				width: 32px;
				height: 1px;
				background: var(--gold);
			}
			.section-h {
				font-family: var(--serif);
				font-size: clamp(2.2rem, 3.5vw, 3.4rem);
				font-weight: 600;
				line-height: 1.1;
				color: var(--navy);
				margin-bottom: 1.5rem;
			}
			.section-h em {
				font-style: italic;
				color: var(--gold);
			}
			.mission-box {
				background: var(--navy);
				border-radius: 6px;
				padding: 2.5rem;
				margin: 2rem 0;
				position: relative;
				overflow: hidden;
			}
			.mission-box::before {
				content: '';
				position: absolute;
				top: 0;
				left: 0;
				right: 0;
				height: 3px;
				background: linear-gradient(90deg, var(--gold), var(--gold2), transparent);
			}
			.mission-label {
				font-size: 0.65rem;
				font-weight: 700;
				letter-spacing: 0.2em;
				text-transform: uppercase;
				color: var(--gold2);
				margin-bottom: 1rem;
			}
			.mission-text {
				font-family: var(--serif);
				font-size: 1.2rem;
				font-style: italic;
				font-weight: 300;
				color: #fff;
				line-height: 1.7;
			}
			.mission-text strong {
				color: var(--gold2);
				font-style: normal;
				font-weight: 600;
			}
			.calling-p {
				font-size: 0.98rem;
				font-weight: 300;
				color: var(--mid);
				line-height: 1.85;
				margin-bottom: 1rem;
			}
			.calling-p strong {
				color: var(--navy);
				font-weight: 600;
			}
			.identity-pills {
				display: flex;
				flex-wrap: wrap;
				gap: 0.6rem;
				margin-top: 2rem;
			}
			.pill {
				font-size: 0.72rem;
				font-weight: 600;
				letter-spacing: 0.06em;
				color: var(--navy);
				background: rgba(196, 137, 58, 0.1);
				border: 1px solid rgba(196, 137, 58, 0.3);
				padding: 0.4rem 1rem;
				border-radius: 100px;
				transition:
					background 0.2s,
					color 0.2s;
			}
			.pill:hover {
				background: var(--navy);
				color: var(--gold2);
			}

			/* ══ CEDAR PRINCIPLES ══ */
			#cedar {
				background: var(--navy);
				padding: 8rem 5vw;
				position: relative;
				overflow: hidden;
			}
			.cedar-bg-word {
				position: absolute;
				top: 50%;
				left: 50%;
				transform: translate(-50%, -50%);
				font-family: var(--serif);
				font-size: clamp(12rem, 30vw, 36rem);
				font-weight: 700;
				color: rgba(255, 255, 255, 0.015);
				white-space: nowrap;
				pointer-events: none;
				user-select: none;
			}
			.cedar-inner {
				position: relative;
				z-index: 2;
				max-width: 1200px;
				margin: 0 auto;
			}
			.cedar-intro {
				display: grid;
				grid-template-columns: 1fr 1fr;
				gap: 5rem;
				align-items: center;
				margin-bottom: 5rem;
			}
			.cedar-verse {
				font-family: var(--serif);
				font-size: clamp(1.4rem, 2.5vw, 2rem);
				font-style: italic;
				color: rgba(255, 255, 255, 0.8);
				line-height: 1.6;
				border-left: 3px solid var(--gold);
				padding-left: 1.5rem;
			}
			.cedar-verse cite {
				display: block;
				font-style: normal;
				font-size: 0.75rem;
				letter-spacing: 0.14em;
				text-transform: uppercase;
				color: var(--gold2);
				margin-top: 0.8rem;
			}
			.cedar-desc {
				font-size: 0.95rem;
				font-weight: 300;
				color: rgba(255, 255, 255, 0.5);
				line-height: 1.85;
			}
			.cedar-desc strong {
				color: rgba(255, 255, 255, 0.8);
				font-weight: 500;
			}
			.principles-grid {
				display: grid;
				grid-template-columns: repeat(3, 1fr);
				gap: 1.5px;
				background: rgba(196, 137, 58, 0.12);
			}
			.principle-card {
				background: var(--navy2);
				padding: 2.8rem 2.2rem;
				position: relative;
				overflow: hidden;
				transition: background 0.3s;
			}
			.principle-card:hover {
				background: var(--navy3);
			}
			.principle-card::before {
				content: '';
				position: absolute;
				top: 0;
				left: 0;
				right: 0;
				height: 2px;
				background: var(--gold);
				transform: scaleX(0);
				transform-origin: left;
				transition: transform 0.4s var(--ease);
			}
			.principle-card:hover::before {
				transform: scaleX(1);
			}
			.principle-num {
				font-family: var(--serif);
				font-size: 4.5rem;
				font-weight: 700;
				color: rgba(196, 137, 58, 0.08);
				line-height: 1;
				margin-bottom: 1.5rem;
				display: block;
			}
			.principle-icon {
				font-size: 1.6rem;
				margin-bottom: 1.2rem;
				display: block;
			}
			.principle-name {
				font-family: var(--serif);
				font-size: 1.2rem;
				font-weight: 600;
				color: #fff;
				margin-bottom: 0.4rem;
			}
			.principle-ref {
				font-size: 0.68rem;
				font-weight: 700;
				letter-spacing: 0.12em;
				text-transform: uppercase;
				color: var(--gold2);
				margin-bottom: 1rem;
			}
			.principle-body {
				font-size: 0.85rem;
				font-weight: 300;
				color: rgba(255, 255, 255, 0.5);
				line-height: 1.75;
			}
			.principle-application {
				font-size: 0.8rem;
				font-style: italic;
				color: var(--gold2);
				margin-top: 1rem;
				padding-top: 1rem;
				border-top: 1px solid rgba(196, 137, 58, 0.15);
				line-height: 1.6;
			}

			/* ══ ABOUT / STORY ══ */
			#about {
				background: var(--white);
				overflow: hidden;
			}
			.about-split {
				display: grid;
				grid-template-columns: 1fr 1fr;
				min-height: 80vh;
			}
			.about-img-col {
				position: relative;
				overflow: hidden;
				background: linear-gradient(160deg, var(--navy2), var(--navy3));
			}
			.about-img-inner {
				position: absolute;
				inset: 0;
				display: flex;
				align-items: center;
